services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: peak
      POSTGRES_PASSWORD: peak
      POSTGRES_DB: peak
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U peak']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://peak:peak@postgres:5432/peak?schema=public
      FINNHUB_API_KEY: ${FINNHUB_API_KEY}
      PORT: 3000
    ports:
      - '3000:3000'

volumes:
  postgres_data:
